kind = "web"
  previewPath = "/"
  title = "SakanMatch"
  version = "1.0.0"
  id = "artifacts/sakanmatch"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 19198

  [services.development]
  run = "pnpm --filter @workspace/sakanmatch run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/sakanmatch", "run", "build" ]
  publicDir = "artifacts/sakanmatch/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "19198"
  BASE_PATH = "/"
  