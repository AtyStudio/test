[build]
  base    = "artifacts/sakanmatch"
  command = "npm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH    = "/"

# --- API proxy -----------------------------------------------------------
# Point VITE_API_URL to your deployed backend (e.g. on Replit, Railway, Render).
# Set it as an environment variable in the Netlify UI:
#   Key:   VITE_API_URL
#   Value: https://your-api-server.example.com
#
# If VITE_API_URL is set, the frontend will call that origin directly.
# Alternatively, uncomment and fill in the redirect below to proxy /api/*
# through Netlify's CDN edge (keeps the backend URL hidden from the browser).
#
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://your-api-server.example.com/api/:splat"
#   status = 200
#   force  = true

# --- SPA fallback --------------------------------------------------------
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
